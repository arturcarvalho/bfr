name: Review Coverage Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  review-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build bfr
        run: go build -o bfr .

      # Option A: Just output review status (informational)
      # - name: Review status
      #   run: ./bfr --ci

      # Option B: Fail if below threshold
      - name: Review gate
        run: ./bfr --ci --min-reviewed 80
